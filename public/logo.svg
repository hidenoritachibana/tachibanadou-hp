<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2440"/>
      <stop offset="1" stop-color="#0c1222"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#e35a0c"/>
    </linearGradient>
  </defs>

  <!-- 墨色の角丸バッジ -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="116" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="8"/>

  <!-- T モノグラム（分割構成） -->
  <!-- クロスバー -->
  <rect x="116" y="126" width="280" height="72" rx="28" fill="url(#bar)"/>
  <!-- ステム -->
  <rect x="220" y="218" width="72" height="174" rx="28" fill="#ffffff"/>
</svg>
